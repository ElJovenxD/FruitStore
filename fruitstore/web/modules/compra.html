<!DOCTYPE html>
<html lang="es">
<head>
    <title>FruitStore - Compras</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style/bootstrap/css/bootstrap.css">
    <link rel="stylesheet" href="../style/style.css" type="text/css">
    <link rel="stylesheet" href="../style/sweetalert2/sweetalert2.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="principal.html">Fruit Store</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="producto.html">Productos</a></li>
                    <li class="nav-item"><a class="nav-link" href="categoria.html">Categorías</a></li>
                    <li class="nav-item"><a class="nav-link" href="vendedor.html">Vendedores</a></li>
                    <li class="nav-item"><a class="nav-link" href="venta.html">Ventas</a></li>
                    <li class="nav-item"><a class="nav-link" href="proveedor.html">Proveedores</a></li>
                    <li class="nav-item"><a class="nav-link active" href="compras.html">Compras</a></li>
                </ul>
                <button class="btn btn-outline-danger" onclick="logout()">Salir</button>
            </div>
        </div>
    </nav>

    <div class="container mt-4 mb-5">
        <div class="card p-4 mb-4 shadow-sm">
            <h3>Nueva Compra</h3>
            <hr>
            <div class="row g-3">
                <div class="col-md-12">
                    <label class="form-label">Seleccionar Proveedor</label>
                    <select id="cmbProveedor" class="form-select"></select>
                </div>
            </div>
        </div>

        <div class="card p-4 mb-4 shadow-sm border-primary">
            <h3 class="text-primary">Detalle de Productos</h3>
            <hr>
            <div class="row g-3 align-items-end">
                <div class="col-md-5">
                    <label class="form-label">Producto</label>
                    <select id="cmbProducto" class="form-select"></select>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Cantidad (Kg)</label>
                    <input id="txtCantidad" type="number" class="form-control" placeholder="0">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Precio de Compra</label>
                    <input id="txtPrecioCompra" type="number" class="form-control" placeholder="0.00">
                </div>
                <div class="col-md-2">
                    <button class="btn btn-success w-100" onclick="agregarProductoALista()">➕ Agregar</button>
                </div>
            </div>

            <div class="table-responsive mt-4">
                <table class="table table-sm table-hover table-bordered">
                    <thead class="table-dark">
                        <tr>
                            <th>Producto</th>
                            <th>Cantidad</th>
                            <th>Precio Unitario</th>
                            <th>Subtotal</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tbodyDetalleTemporal"></tbody>
                </table>
            </div>
            <div class="text-end mt-2">
                <h4>Total Compra: <span class="text-success">$<span id="spnTotal">0.00</span></span></h4>
                <button class="btn btn-primary btn-lg mt-3" onclick="guardar()">💾 Registrar Compra Completa</button>
            </div>
        </div>

        <div class="card p-4 shadow-sm">
            <h3>Historial de Compras</h3>
            <table class="table table-hover mt-3">
                <thead class="table-light">
                    <tr>
                        <th>Folio</th>
                        <th>Fecha</th>
                        <th>Proveedor</th>
                        <th class="text-center">Detalles</th>
                    </tr>
                </thead>
                <tbody id="tbodyCompras"></tbody>
            </table>
        </div>
    </div>

    <script src="../style/sweetalert2/sweetalert2.all.min.js"></script>
    <script src="../style/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="../js/fruitstore_sec.js"></script>
    <script type="module">
        import { inicializarModulo } from '../js/compra.js';
        document.addEventListener("DOMContentLoaded", () => { inicializarModulo(); });
    </script>
    <script>
        if (!validarSesion()) {
            document.body.style.display = "none";
        }
    </script>
</body>
</html>
