<!DOCTYPE html>
<html lang="es">
<head>
    <title>FruitStore - Categorías</title>
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Jose de Jesus Martin Zuñiga">
    <link rel="stylesheet" href="../style/bootstrap/css/bootstrap.css">
    <link rel="stylesheet" href="../style/bootstrap/css/bootstrap-grid.css"/>
    <link rel="stylesheet" href="../style/bootstrap/css/bootstrap-utilities.css"/>
    <link rel="stylesheet" href="../style/style.css" type="text/css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="principal.html">Fruit Store</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="producto.html">Productos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="categoria.html">Categorías</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="vendedor.html">Vendedores</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="venta.html">Ventas</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="proveedor.html">Proveedores</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="compra.html">Compras</a>
                    </li>
                </ul>
                <button class="btn btn-outline-danger" onclick="logout()">Salir</button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="card p-4 mb-4 shadow-sm">
            <h3>Detalle de Categoría</h3>
            <div class="row g-3">
                <div class="col-md-2">
                    <label class="form-label">ID</label>
                    <input id="txtIdCategoria" type="text" class="form-control" readonly>
                </div>
                <div class="col-md-10">
                    <label class="form-label">Nombre de la Categoría</label>
                    <input id="txtNombre" type="text" class="form-control">
                </div>
            </div>
            <div class="mt-3 text-center">
                <button class="btn btn-primary" onclick="guardar()">💾 Guardar</button>
                <button class="btn btn-danger" onclick="eliminar()">🗑️ Eliminar</button>
                <button class="btn btn-success" onclick="limpiar()">✨ Nuevo</button>
            </div>
        </div>

        <div class="card p-4 shadow-sm">
            <h3>Listado de Categorías</h3>
            <table class="table table-hover">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody id="tbodyCategorias"></tbody>
            </table>
        </div>
    </div>
    
    <script src="../style/sweetalert2/sweetalert2.all.min.js"></script>
    <script src="../js/fruitstore_sec.js"></script> <script src="../js/categoria.js"></script>
    <script src="../style/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import { inicializarModulo } from '../js/categoria.js';
        
        document.addEventListener("DOMContentLoaded", () => {
            inicializarModulo();
        });
    </script>
</body>
</html>
