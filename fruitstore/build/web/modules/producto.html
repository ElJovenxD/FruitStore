<!DOCTYPE html>
<html lang="es">
<head>
    <title>FruitStore - Productos</title>
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style/bootstrap/css/bootstrap.css">
    <link rel="stylesheet" href="../style/style.css" type="text/css">
    <link rel="stylesheet" href="../style/sweetalert2/sweetalert2.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="principal.html">Fruit Store</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="producto.html">Productos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="categoria.html">Categorías</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="vendedor.html">Vendedores</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="venta.html">Ventas</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="proveedor.html">Proveedores</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="compra.html">Compras</a>
                    </li>
                </ul>
                <button class="btn btn-outline-danger" onclick="logout()">Salir</button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="card p-4 mb-4 shadow-sm">
            <h3>Detalle de Producto</h3>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Nombre del Producto</label>
                    <input id="txtNombre" type="text" class="form-control">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Categoría</label>
                    <select id="cmbCategoria" class="form-select">
                        <option value="1">Fruta</option>
                        <option value="2">Verdura</option>
                        <option value="3">Hortaliza</option>
                        <option value="4">Legumbre</option>
                        <option value="5">Cereal</option>
                        <option value="6">Datil</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Precio</label>
                    <input id="txtPrecio" type="number" class="form-control">
                </div>
            </div>
            <div class="mt-3 text-center">
                <button class="btn btn-primary" onclick="guardar()">💾 Guardar</button>
                <button class="btn btn-danger" onclick="eliminar()">🗑️ Eliminar</button>
                <button class="btn btn-success" onclick="limpiar()">✨ Nuevo</button>
            </div>
        </div>

        <div class="card p-4 shadow-sm">
            <h3>Catálogo de Productos</h3>
            <table class="table table-hover">
                <thead class="table-light">
                    <tr>
                        <th>Nombre</th><th>Categoría</th><th>Precio</th><th>Estatus</th><th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tbodyProductos">
                    </tbody>
            </table>
        </div>
    </div>
    <script src="../style/sweetalert2/sweetalert2.all.min.js"></script>
    <script src="../js/fruitstore_sec.js"></script>
    <script src="../js/producto.js"></script> 
    <script src="../style/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import { inicializarModulo } from '../js/producto.js';
        document.addEventListener("DOMContentLoaded", () => {
            inicializarModulo();
        });
    </script>
    <script>
        if (!validarSesion()) {
            document.body.style.display = "none";
        }
    </script>
</body>
</html>
