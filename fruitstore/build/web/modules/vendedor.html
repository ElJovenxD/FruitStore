<!DOCTYPE html>
<html lang="es">
<head>
    <title>FruitStore - Gestión de Vendedores</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style/bootstrap/css/bootstrap.css">
    <link rel="stylesheet" href="../style/style.css" type="text/css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="principal.html">Fruit Store</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="producto.html">Productos</a></li>
                    <li class="nav-item"><a class="nav-link" href="categoria.html">Categorías</a></li>
                    <li class="nav-item"><a class="nav-link active" href="vendedor.html">Vendedores</a></li>
                    <li class="nav-item"><a class="nav-link" href="venta.html">Ventas</a></li>
                    <li class="nav-item"><a class="nav-link" href="proveedor.html">Proveedores</a></li>
                    <li class="nav-item"><a class="nav-link" href="compra.html">Compras</a></li>
                </ul>
                <button class="btn btn-outline-danger" onclick="logout()">Salir</button>
            </div>
        </div>
    </nav>

    <div class="container mt-4 mb-5">
        <div class="card p-4 mb-4 shadow-sm border-0">
            <div class="d-flex justify-content-between align-items-center">
                <h3>Detalle del Vendedor</h3>
                <span id="badgeEstatus" class="badge bg-success">Activo</span>
            </div>
            <hr>
            <div class="row g-3">
                <div class="col-md-2">
                    <label class="form-label fw-bold">ID</label>
                    <input id="txtId" type="text" class="form-control bg-light" readonly placeholder="Auto">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Nombre Completo</label>
                    <input id="txtNombre" type="text" class="form-control">
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-bold">Estatus Actual</label>
                    <input id="txtEstatus" type="text" class="form-control bg-light" readonly value="Activo">
                </div>

                <div class="col-md-6">
                    <div class="card p-3 bg-light border-0">
                        <label class="form-label fw-bold text-primary"><i class="fas fa-user-lock"></i> Cuenta de Usuario</label>
                        <div class="row">
                            <div class="col-md-6">
                                <input id="txtUsuario" type="text" class="form-control" placeholder="Nombre de usuario">
                            </div>
                            <div class="col-md-6">
                                <input id="txtPassword" type="password" class="form-control" placeholder="Contraseña">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-md-3">
                    <label class="form-label fw-bold">Género</label>
                    <select id="cmbGenero" class="form-select">
                        <option value="M">Masculino</option>
                        <option value="F">Femenino</option>
                        <option value="O">Otro</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-bold">Fecha Nacimiento</label>
                    <input id="txtFechaNac" type="date" class="form-control">
                </div>

                <div class="col-md-3">
                    <label class="form-label fw-bold">Teléfono</label>
                    <input id="txtTelefono" type="text" class="form-control">
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-bold">Email</label>
                    <input id="txtEmail" type="email" class="form-control">
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-bold">Fecha Alta</label>
                    <input id="txtFechaAlta" type="date" class="form-control bg-light" readonly>
                </div>

                <div class="col-md-4">
                    <label class="form-label fw-bold">Calle</label>
                    <input id="txtCalle" type="text" class="form-control">
                </div>
                <div class="col-md-2">
                    <label class="form-label fw-bold">Ext.</label>
                    <input id="txtNumExt" type="text" class="form-control">
                </div>
                <div class="col-md-2">
                    <label class="form-label fw-bold">Int.</label>
                    <input id="txtNumInt" type="text" class="form-control">
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-bold">Colonia</label>
                    <input id="txtColonia" type="text" class="form-control">
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-bold">Ciudad</label>
                    <input id="txtCiudad" type="text" class="form-control">
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-bold">Estado</label>
                    <input id="txtEstado" type="text" class="form-control">
                </div>
                <div class="col-md-2">
                    <label class="form-label fw-bold">C.P.</label>
                    <input id="txtCp" type="text" class="form-control">
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-bold">País</label>
                    <input id="txtPais" type="text" class="form-control">
                </div>
            </div>

            <div class="mt-4 text-center">
                <button class="btn btn-primary px-4" onclick="guardar()">
                    <i class="fas fa-save"></i> Guardar
                </button>
                <button class="btn btn-success px-4" onclick="limpiar()">
                    <i class="fas fa-plus"></i> Nuevo
                </button>
                <button id="btnEliminar" class="btn btn-danger px-4" onclick="eliminar()">
                    <i class="fas fa-trash"></i> Dar de Baja
                </button>
                <button id="btnReactivar" class="btn btn-warning px-4 d-none" onclick="reactivar()">
                    <i class="fas fa-undo"></i> Reactivar Vendedor
                </button>
            </div>
        </div>

        <div class="card p-4 shadow-sm border-0">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h3>Listado General</h3>
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="chkMostrarInactivos">
                    <label class="form-check-label fw-bold" for="chkMostrarInactivos">Ver Vendedores de Baja</label>
                </div>
            </div>
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>Nombre</th>
                            <th>Email</th>
                            <th>Ciudad</th>
                            <th>Teléfono</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tbodyVendedores">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="../style/sweetalert2/sweetalert2.all.min.js"></script>
    <script src="../style/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="../js/fruitstore_sec.js"></script>
    <script type="module">
        import { inicializarModulo } from '../js/vendedor.js';
        document.addEventListener("DOMContentLoaded", () => {
            inicializarModulo();
        });
    </script>
    <script>
        // Validación de sesión integrada
        if (typeof validarSesion === 'function' && !validarSesion()) {
            document.body.style.display = "none";
        }
    </script>
</body>
</html>
